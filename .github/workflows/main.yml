nom : RDP 

sur : 
  workflow_dispatch : 

tâches : 
  secure-rdp : 
    runs-on : windows-latest 
    timeout-minutes : 3600 

    étapes : 
      - nom : Configurer les paramètres RDP de base 
        exécuter : | 
          # Activer le Bureau à distance et désactiver l'authentification au niveau du réseau (si nécessaire) 
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' ` 
                             -Name "fDenyTSConnections" -Value 0 -Force 
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' ` 
                             -Name "UserAuthentication" -Value 0 -Force 
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' ` 
                             -Name "SecurityLayer" -Value 0 -Force 

          # Supprimer toute règle existante portant le même nom pour éviter les doublons 
          netsh advfirewall firewall delete rule name="RDP-Tailscale" 
          
          # Pour les tests, autoriser toute connexion entrante sur le port 3389 
          netsh advfirewall firewall add rule name="RDP-Tailscale" ` 
            dir=in action=allow protocol=TCP localport=3389 

          # (Facultatif) Redémarrez le service Bureau à distance pour que les modifications soient prises en compte 
          Restart-Service -Name TermService -Force 

      - name: Créer un utilisateur RDP avec un mot de passe sécurisé 
        run: | 
          Add-Type -AssemblyName System.Security 
          $charSet = @{ 
              Upper = [char[]](65..90) # AZ 
              Lower = [char[]](97..122) # az 
              Number = [char[]](48..57) # 0-9 
              Special = ([char[]](33..47) + [char[]](58..64) + 
                         [char[]](91..96) + [char[]](123..126)) # Caractères spéciaux 
          } 
          $rawPassword = @() 
          $rawPassword += $charSet.Upper | Get-Random -Count 4 
          $rawPassword += $charSet.Lower | Get-Random -Count 4 
          $rawPassword += $charSet.Number | Get-Random -Count 4 
          $rawPassword += $charSet.Special | Get-Random -Count 4 
          $password = -join ($rawPassword | Sort-Object { Get-Random }) 
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force 
          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires 
          Add-LocalGroupMember -Group "Administrators" -Member "RDP" 
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"
          
          echo "RDP_CREDS=Utilisateur : RDP | Mot de passe : $password" >> $env:GITHUB_ENV 
          
          if (-not (Get-LocalUser -Name "RDP")) { 
              Write-Error "Échec de la création de l'utilisateur" 
              exit 1 
          } 

      - name: Installer Tailscale 
        run: | 
          $tsUrl = " https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi " 
          $installerPath = "$env:TEMP tailscale.msi" 
          
          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath 
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait 
          Remove-Item $installerPath -Force 

      - name: Établir la connexion Tailscale 
        run: | 
          # Lancer Tailscale avec la clé d'authentification fournie et définir un nom d'hôte unique 
          & "$env:ProgramFiles\Tailscale ailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner-$env:GITHUB_RUN_ID 
          
          # Attendre que Tailscale attribue une adresse IP 
          $tsIP = $null 
          $retries = 0 
          while (-not $tsIP -and $retries -lt 10) { 
              $tsIP = & "$env:ProgramFiles\Tailscale ailscale.exe" ip -4 
              Start-Sleep -Seconds 5 
              $retries++ 
          } 
          
          if (-not $tsIP) { 
              Write-Error "Adresse IP de Tailscale non attribuée. Sortie." 
              exit 1 
          } 
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV 
      
      - name: Vérifier l'accessibilité RDP 
        run: | 
          Write-Host "Adresse IP de Tailscale : $env:TAILSCALE_IP" 
          
          # Test de connectivité à l'aide de Test-NetConnection sur l'adresse IP de Tailscale sur le port 3389 
          $testResult = Test-NetConnection -ComputerName $env:TAILSCALE_IP -Port 3389 
          if (-not $testResult.TcpTestSucceeded) { 
              Write-Error "Échec de la connexion TCP au port RDP 3389" 
              exit 1 
          } 
          Write-Host "Connectivité TCP réussie !" 

      - name: Maintain Connection 
        run: | 
          Write-Host "`n=== ACCÈS RDP ===" 
          Write-Host "Adresse : $env:TAILSCALE_IP" 
          Write-Host "Nom d'utilisateur : RDP" 
          Write-Host "Mot de passe : $(echo $env:RDP_CREDS)" 
          Write-Host "==================`n" 
          
          # Garder le runner actif indéfiniment (ou jusqu'à annulation manuelle) 
          while ($true) { 
              Write-Host "[$(Get-Date)] RDP actif - Utilisez Ctrl+C dans le workflow pour terminer" 
              Start-Sleep -Seconds 300
          }
